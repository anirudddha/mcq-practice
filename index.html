<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Practice Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="hero">
                <h1>Test Your Knowledge</h1>
                <p>Ready to challenge yourself? Each attempt is randomly shuffled.</p>
                <button id="start-btn" class="primary-btn">Start Quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <header class="quiz-header">
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div class="quiz-meta">
                    <span id="question-stats">Question 1 of 10</span>
                    <span id="category-badge" class="badge">Category</span>
                </div>
            </header>

            <main class="question-container">
                <h2 id="question-text">Loading question...</h2>
                <div id="options-container" class="options-grid">
                    <!-- Options injected here -->
                </div>
            </main>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen scrollable">
            <div class="result-header">
                <h2>Quiz Complete!</h2>
                <div class="score-circle">
                    <span id="score-text">0/0</span>
                    <span class="score-label">Score</span>
                </div>
            </div>

            <div class="review-section">
                <h3>Review Your Answers</h3>
                <div id="review-container" class="review-list">
                    <!-- Review items injected here -->
                </div>
            </div>

            <button id="restart-btn" class="primary-btn mt-4">Play Again</button>
        </div>
    </div>

    <div class="signature">Powered by Aniruddha</div>

    <script src="app.js"></script>
</body>

</html>
